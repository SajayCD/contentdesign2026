<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" width="32" height="32">
  <!-- Indigo background -->
  <rect width="32" height="32" fill="#4F46E5"/>
  
  <!-- Two quotation mark dots (top circles) -->
  <circle cx="11" cy="11" r="3.5" fill="white"/>
  <circle cx="21" cy="11" r="3.5" fill="white"/>
  
  <!-- Two curved tails curving down-left from each dot -->
  <path d="M 11 14.5 Q 7 18 8 22" stroke="white" stroke-width="3" stroke-linecap="round" fill="none"/>
  <path d="M 21 14.5 Q 17 18 18 22" stroke="white" stroke-width="3" stroke-linecap="round" fill="none"/>
</svg>